name: Deploy Godot Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # 取消进行中的旧部署，避免重跑时残留同名 artifact 导致 deploy-pages 报
  # "Multiple artifacts named github-pages were unexpectedly found"。
  cancel-in-progress: true

jobs:
  export-web:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.1
          use-dotnet: false
          include-templates: true

      - name: Check Godot version
        run: godot --version

      - name: Import project once
        run: |
          godot --headless --path . --import --quit

      - name: Force non-threaded template
        # GitHub Pages 不发 COOP/COEP 头，必须用非线程版 wasm（不需 SharedArrayBuffer）。
        # export_presets.cfg 已设 variant/thread_support=false，这里显式指定非线程模板
        # 作为双保险，确保产物是 web_nothreads_release.zip 编译的非线程版。
        run: |
          NO_THREADS_TPL="$HOME/.local/share/godot/export_templates/4.6.1.stable/web_nothreads_release.zip"
          if [ ! -f "$NO_THREADS_TPL" ]; then
            echo "ERROR: non-threaded template not found at $NO_THREADS_TPL"
            exit 1
          fi
          sed -i "s|^custom_template/release=.*|custom_template/release=\"$NO_THREADS_TPL\"|" export_presets.cfg
          grep "custom_template" export_presets.cfg

      - name: Export Web
        run: |
          mkdir -p dist
          godot --headless --path . --export-release "Web" "dist/index.html"

      - name: Gzip-precompress wasm
        # 与 deploy-tencent.yml 保持一致：预压缩 .wasm -> .wasm.gz 并删除原始 .wasm。
        # custom_shell.html 会先 fetch .wasm.gz，通过 DecompressionStream("gzip") 解压；
        # 这样国内用户从 GitHub Pages 下载体量从 ~37MB 降到 ~10MB，避免卡死在加载界面。
        # GitHub Pages 不会给 .wasm.gz 自动加 Content-Encoding: gzip，shell 已正确处理该情况。
        run: |
          set -euo pipefail
          cd dist
          gzip -9 -k -f index.wasm
          echo "index.wasm -> $(du -h index.wasm.gz | cut -f1)"
          rm -f index.wasm
          ls -lh

      - name: Validate Web export artifact
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/index.js
          test -f dist/index.pck
          test -f dist/index.wasm.gz
          test ! -f dist/index.wasm
          grep -q 'DecompressionStream' dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
