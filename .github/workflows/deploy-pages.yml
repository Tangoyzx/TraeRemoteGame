name: Deploy Godot Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # 取消进行中的旧部署，避免重跑时残留同名 artifact 导致 deploy-pages 报
  # "Multiple artifacts named github-pages were unexpectedly found"。
  cancel-in-progress: true

jobs:
  export-web:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.1
          use-dotnet: false
          include-templates: true

      - name: Check Godot version
        run: godot --version

      - name: Import project once
        run: |
          godot --headless --path . --import --quit

      - name: Diagnose preset & templates
        run: |
          echo "=== export_presets.cfg (thread_support should be false) ==="
          grep -n "thread_support\|custom_template" export_presets.cfg || true
          echo "=== installed web templates ==="
          ls -1 ~/.local/share/godot/export_templates/4.6.1.stable/ 2>/dev/null | grep -i web || true
          echo "=== template dir contents (web-related) ==="
          find ~/.local/share/godot/export_templates/4.6.1.stable/ -iname "*web*" 2>/dev/null || true

      - name: Force non-threaded template
        # Godot 4.6.1 CLI 导出会忽略 export_presets.cfg 里的 variant/thread_support=false，
        # 仍用线程版模板（产物含 index.audio.position.worklet.js，需要 SharedArrayBuffer）。
        # GitHub Pages 不发 COOP/COEP 头，线程版无法运行。这里显式把 custom_template/release
        # 指向 runner 上的非线程模板 web_nothreads_release.zip，强制产出非线程版。
        run: |
          NO_THREADS_TPL="$HOME/.local/share/godot/export_templates/4.6.1.stable/web_nothreads_release.zip"
          if [ ! -f "$NO_THREADS_TPL" ]; then
            echo "ERROR: non-threaded template not found at $NO_THREADS_TPL"
            exit 1
          fi
          echo "Using non-threaded template: $NO_THREADS_TPL"
          sed -i "s|^custom_template/release=.*|custom_template/release=\"$NO_THREADS_TPL\"|" export_presets.cfg
          grep "custom_template" export_presets.cfg

      - name: Export Web
        run: |
          mkdir -p dist
          godot --headless --path . --export-release "Web" "dist/index.html" 2>&1 | tee export.log
          echo "=== dist contents ==="
          ls -la dist/
          echo "=== thread markers in index.js (expect 0 for non-threaded) ==="
          grep -c "SharedArrayBuffer" dist/index.js || true
          grep -c "pthread" dist/index.js || true
          echo "=== audio.position.worklet present? (only in threaded) ==="
          ls dist/index.audio.position.worklet.js 2>/dev/null && echo "THREADED BUILD" || echo "no position worklet (non-threaded OK)"

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
