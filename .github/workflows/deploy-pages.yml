name: Deploy Godot Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # 取消进行中的旧部署，避免重跑时残留同名 artifact 导致 deploy-pages 报
  # "Multiple artifacts named github-pages were unexpectedly found"。
  cancel-in-progress: true

jobs:
  export-web:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.1
          use-dotnet: false
          include-templates: true

      - name: Check Godot version
        run: godot --version

      - name: Import project once
        run: |
          godot --headless --path . --import --quit

      - name: Diagnose preset & templates
        run: |
          echo "=== export_presets.cfg (thread_support should be false) ==="
          grep -n "thread_support\|custom_template" export_presets.cfg || true
          echo "=== installed web templates ==="
          ls -1 ~/.local/share/godot/export_templates/4.6.1.stable/ 2>/dev/null | grep -i web || true
          echo "=== template dir contents (web-related) ==="
          find ~/.local/share/godot/export_templates/4.6.1.stable/ -iname "*web*" 2>/dev/null || true

      - name: Export Web
        run: |
          mkdir -p dist
          godot --headless --path . --export-release "Web" "dist/index.html" 2>&1 | tee export.log
          echo "=== dist contents ==="
          ls -la dist/
          echo "=== thread markers in index.js (expect 0 for non-threaded) ==="
          grep -c "SharedArrayBuffer" dist/index.js || true
          grep -c "pthread" dist/index.js || true
          echo "=== audio.position.worklet present? (only in threaded) ==="
          ls dist/index.audio.position.worklet.js 2>/dev/null && echo "THREADED BUILD" || echo "no position worklet"

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
