name: Deploy Godot Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  export-web:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.1
          use-dotnet: false
          include-templates: true

      - name: Check Godot version
        run: godot --version

      - name: Import project once
        run: |
          godot --headless --path . --import --quit

      - name: Export Web
        run: |
          mkdir -p dist
          godot --headless --path . --export-release "Web" "dist/index.html"

      - name: Gzip-precompress large assets
        run: |
          # 用 gzip 预压缩 wasm（36MB → ~11MB），自定义 HTML shell 用 DecompressionStream("gzip") 解压
          # gzip 在所有支持 DecompressionStream 的浏览器里都确定可用（brotli 实现不统一）
          set -e
          cd dist
          gzip -9 -k -f index.wasm
          echo "index.wasm -> $(du -h index.wasm.gz | cut -f1)"
          # 删除原始 wasm：.wasm.gz 满足 EdgeOne 25MB 单文件限制，回退时再重建
          rm -f index.wasm
          ls -lh

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
