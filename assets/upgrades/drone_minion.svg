<svg xmlns="http://www.w3.org/2000/svg" width="100" height="200" viewBox="0 0 100 200">
  <rect width="100" height="200" rx="14" fill="#1F2933"/>
  <!-- 玩家位置:中央浅色小圆 -->
  <circle cx="50" cy="100" r="8" fill="#38BDF8"/>
  <!-- 环绕轨道(虚线) -->
  <circle cx="50" cy="100" r="34" fill="none" stroke="#5ED7FF" stroke-width="2" stroke-dasharray="4 6" opacity="0.6"/>
  <!-- 小兵本体(右上方位) -->
  <circle cx="78" cy="78" r="12" fill="#E8F8FF" stroke="#5ED7FF" stroke-width="3"/>
  <circle cx="78" cy="78" r="5" fill="#38BDF8"/>
  <!-- 爆炸光环(下方示意) -->
  <circle cx="38" cy="138" r="20" fill="none" stroke="#FFB347" stroke-width="3" opacity="0.85"/>
  <circle cx="38" cy="138" r="20" fill="#FFB347" opacity="0.2"/>
</svg>
