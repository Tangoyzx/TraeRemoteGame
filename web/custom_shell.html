<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>$GODOT_PROJECT_NAME</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
  #canvas { display: block; width: 100vw; height: 100vh; }
  #loading {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #111; z-index: 10;
  }
  #loading h1 { font-size: 18px; font-weight: 500; margin-bottom: 16px; }
  #bar { width: 240px; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
  #fill { width: 0%; height: 100%; background: #4a9; transition: width 0.2s; }
  #pct { margin-top: 10px; font-size: 12px; color: #888; word-break: break-all; max-width: 90vw; text-align: center; }
</style>
$GODOT_HEAD_INCLUDE
</head>
<body>
<canvas id="canvas"></canvas>
<div id="loading">
  <h1>Loading…</h1>
  <div id="bar"><div id="fill"></div></div>
  <div id="pct">0%</div>
</div>
<script src="$GODOT_URL"></script>
<script>
(function () {
  // 优先加载预压缩产物 (.wasm.gz)，浏览器端用 DecompressionStream("gzip") 解压。
  // 回退链：.wasm.gz 解压 → 失败则直接 fetch .wasm（兼容未预压缩环境）。
  // 注意：Godot 4.6 自定义 shell 不支持 $GODOT_BASENAME，从 $GODOT_URL（如 "index.js"）推导。
  var GURL = "$GODOT_URL";
  var BAS = GURL.replace(/\.js$/, "");

  function log(msg) {
    console.log("[load]", msg);
    var el = document.getElementById("pct");
    if (el) el.textContent = msg;
  }

  function fetchAndDecompress(url) {
    return fetch(url).then(function (r) {
      if (!r.ok) throw new Error(url + " HTTP " + r.status);
      return r.body.pipeThrough(new DecompressionStream("gzip"));
    });
  }

  function fetchWasm(url) {
    return fetch(url).then(function (r) {
      if (!r.ok) throw new Error(url + " HTTP " + r.status);
      return r.arrayBuffer();
    });
  }

  var hasDS = typeof DecompressionStream !== "undefined";

  var wasmPromise = hasDS
    ? fetchAndDecompress(BAS + ".wasm.gz")
        .then(function (stream) { return new Response(stream).arrayBuffer(); })
        .catch(function (e) {
          log("gzip miss, fallback .wasm");
          return fetchWasm(BAS + ".wasm");
        })
    : fetchWasm(BAS + ".wasm");

  var config = $GODOT_CONFIG;
  config.canvas = document.getElementById("canvas");
  config.onProgress = function (cur, total) {
    if (total > 0) {
      var p = Math.round((cur / total) * 100);
      var fill = document.getElementById("fill");
      if (fill) fill.style.width = p + "%";
      var pct = document.getElementById("pct");
      if (pct) pct.textContent = p + "%";
    }
  };

  var engine = new Engine(config);

  wasmPromise.then(function (wasmBuf) {
    log("wasm ready " + (wasmBuf.byteLength / 1048576).toFixed(1) + "MB");
    // Godot 4.6 的 Engine.startGame() 会在 init() 内部固定 fetch(BAS + ".wasm")。
    // 部署产物为了避免大文件限制只保留 index.wasm.gz，因此这里临时拦截
    // 对 index.wasm 的请求，把已解压的 wasm buffer 作为 application/wasm Response 返回。
    var originalFetch = window.fetch.bind(window);
    var wasmUrl = new URL(BAS + ".wasm", window.location.href).href;
    window.fetch = function (input, init) {
      var inputUrl = typeof input === "string" ? input : (input && input.url);
      if (inputUrl && new URL(inputUrl, window.location.href).href === wasmUrl) {
        return Promise.resolve(new Response(wasmBuf.slice(0), {
          status: 200,
          headers: {
            "Content-Type": "application/wasm",
            "Content-Length": String(wasmBuf.byteLength)
          }
        }));
      }
      return originalFetch(input, init);
    };
    return engine.startGame({ "mainPack": BAS + ".pck" });
  }).then(function () {
    var el = document.getElementById("loading");
    if (el) el.style.display = "none";
  }).catch(function (err) {
    console.error(err);
    var pct = document.getElementById("pct");
    if (pct) pct.textContent = "Load failed: " + (err && err.message ? err.message : err);
  });
})();
</script>
</body>
</html>
