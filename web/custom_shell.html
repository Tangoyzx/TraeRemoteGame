<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>$GODOT_PROJECT_NAME</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
  #canvas { display: block; width: 100vw; height: 100vh; }
  #loading {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #111; z-index: 10;
  }
  #loading h1 { font-size: 18px; font-weight: 500; margin-bottom: 16px; }
  #bar { width: 240px; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
  #fill { width: 0%; height: 100%; background: #4a9; transition: width 0.2s; }
  #pct { margin-top: 10px; font-size: 12px; color: #888; }
</style>
$GODOT_HEAD_INCLUDE
</head>
<body>
<canvas id="canvas"></canvas>
<div id="loading">
  <h1>Loading…</h1>
  <div id="bar"><div id="fill"></div></div>
  <div id="pct">0%</div>
</div>
<script src="$GODOT_URL"></script>
<script>
(function () {
  // 优先加载预压缩产物 (.wasm.br / .js.br)，浏览器端用 DecompressionStream 解压。
  // 如果预压缩文件不存在（404），回退到普通 .wasm / .js，保证 GitHub Pages 等环境也能跑。
  var BAS = "$GODOT_BASENAME";

  function fetchAndDecompress(url) {
    return fetch(url).then(function (r) {
      if (!r.ok) throw new Error(url + " " + r.status);
      return r.body.pipeThrough(new DecompressionStream("brotli"));
    });
  }

  function toArrayBuffer(stream) {
    return new Response(stream).arrayBuffer();
  }

  function toText(stream) {
    return new Response(stream).text();
  }

  var useBr = typeof DecompressionStream !== "undefined";

  var wasmPromise = useBr
    ? fetchAndDecompress(BAS + ".wasm.br")
        .then(toArrayBuffer)
        .catch(function () { return fetch(BAS + ".wasm").then(function (r) { return r.arrayBuffer(); }); })
    : fetch(BAS + ".wasm").then(function (r) { return r.arrayBuffer(); });

  // index.js 必须在 Engine 类可用前就绪：先加载 $GODOT_URL（Godot 生成的 loader），
  // wasm 通过 preloadFile 传给引擎，这样 loader 内部的 WebAssembly.instantiate 用我们解压好的 buffer。

  var config = $GODOT_CONFIG;
  config.canvas = document.getElementById("canvas");
  config.onProgress = function (cur, total) {
    if (total > 0) {
      var p = Math.round((cur / total) * 100);
      document.getElementById("fill").style.width = p + "%";
      document.getElementById("pct").textContent = p + "%";
    }
  };

  var engine = new Engine(config);

  wasmPromise.then(function (wasmBuf) {
    engine.preloadFile(wasmBuf, BAS + ".wasm");
    return engine.startGame({ "mainPack": BAS + ".pck" });
  }).then(function () {
    var el = document.getElementById("loading");
    if (el) el.style.display = "none";
  }).catch(function (err) {
    console.error(err);
    var el = document.getElementById("pct");
    if (el) el.textContent = "Load failed: " + (err && err.message ? err.message : err);
  });
})();
</script>
</body>
</html>
